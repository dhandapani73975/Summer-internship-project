<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In - CineReview</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">
                <a href="/index.html">CineReview</a>
            </div>
            <ul class="nav-links" id="navLinks"></ul>
        </nav>
    </header>

    <main class="container">
        <div class="auth-container">
            <h1>Welcome Back</h1>
            <form id="loginForm">
                <div class="form-group">
                    <label for="loginEmail">Email</label>
                    <input type="email" id="loginEmail" required>
                </div>
                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Log In</button>
            </form>
            <div class="auth-footer">
                Don't have an account? <a href="/signup.html" style="color: var(--primary-color);">Sign up</a>
            </div>
            <div class="error-message" id="loginError" style="margin-top: 1rem; text-align: center;"></div>
        </div>
    </main>

    <script src="/js/store.js"></script>
    <script src="/js/main.js"></script>
    <script src="/js/auth.js"></script>
</body>
</html>
