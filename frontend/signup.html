<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | CineVerse</title>
    <link rel="stylesheet" href="signupstyle.css">
</head>
<body>

    <div class="auth-container">

        <div class="auth-card">

            <h1>Create Account</h1>

           <form id="signupForm">

                <input
                type="text"
                id="name"
                placeholder="Name"
                required>

                <input
                type="email"
                id="email"
                placeholder="Email"
                required>

                <input
                type="password"
                id="password"
                placeholder="Password"
                required>

                <button type="submit">
                    Sign Up
                </button>

            </form>

         

            <p>
                Already have an account?
                <a href="login.html">
                    Login
                </a>
            </p>

        </div>

    </div>

    <!-- <script src="../js/signup.js"></script> -->


</body>
</html>
