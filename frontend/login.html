<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | CineVerse</title>
    <link rel="stylesheet" href="signupstyle.css">
</head>
<body>

    <nav class="auth-navbar">
        <a href="index.html" class="auth-nav-logo">🎬 CineVerse</a>
        <a href="signup.html" class="auth-nav-link">No account? Sign Up →</a>
    </nav>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="logo-text">🎬 CineVerse</div>
                <h1>Welcome Back</h1>
                <p>Sign in to continue to CineVerse</p>
            </div>

            <form id="loginForm">
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" id="email" placeholder="you@example.com" required>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="auth-btn">Sign In</button>
            </form>

            <div class="auth-footer">
                Don't have an account? <a href="signup.html">Sign Up</a>
            </div>
        </div>
    </div>

    <footer class="auth-page-footer">
        <p>© 2026 CineVerse. All rights reserved.</p>
    </footer>

    <script src="../js/login.js"></script>
</body>
</html>
