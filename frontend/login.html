<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width,
                   initial-scale=1.0">

    <title>Login | CineVerse</title>

    <link rel="stylesheet"
          href="./signupstyle.css">
</head>
<body>

<div class="auth-container">

    <div class="auth-card">

        <h1>Login</h1>

        <form id="loginForm">

            <div class="input-group">
                <label>Email</label>

                <input
                type="email"
                id="email"
                required>
            </div>

            <div class="input-group">
                <label>Password</label>

                <input
                type="password"
                id="password"
                required>
            </div>

            <button type="submit">
                Login
            </button>

        </form>

        <p>
            Don't have an account?

            <a href="./signup.html">
                Sign Up
            </a>
        </p>

    </div>

</div>



</body>
</html>
