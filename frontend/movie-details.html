<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Details | CineVerse</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="moviedetails.css">
</head>
<body>

    <!-- Navbar -->
    <header>
        <nav class="navbar">
            <div class="logo">🎬 CineVerse</div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="index.html#movies-section">Movies</a></li>
                <li><a href="login.html">Login</a></li>
                <li><a href="signup.html">Sign Up</a></li>
            </ul>
            <div class="nav-right">
                <a href="profile.html" class="nav-profile">Profile</a>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>
        </nav>
    </header>

    <!-- Movie Details -->
    <div class="details-wrapper">

        <!-- Back Button -->
        <a href="index.html" class="back-btn">← Back to Movies</a>

        <!-- Movie Hero -->
        <div id="movieDetails" class="movie-details-hero"></div>

        <!-- Trailer -->
        <div id="trailerSection" class="trailer-section" style="display:none;">
            <h2 class="section-title">🎬 Official Trailer</h2>
            <div class="trailer-wrap">
                <iframe id="trailerFrame" frameborder="0" allowfullscreen></iframe>
            </div>
        </div>

        <!-- Reviews -->
        <div class="reviews-wrapper">

            <!-- Add Review -->
            <div class="review-form-card">
                <h2 class="section-title">✍️ Write a Review</h2>
                <form id="reviewForm">
                    <div class="form-group">
                        <label>Your Name</label>
                        <input type="text" id="userName" placeholder="Enter your name" required>
                    </div>
                    <div class="form-group">
                        <label>Rating</label>
                        <div class="star-rating" id="starRating">
                            <span data-val="1">★</span>
                            <span data-val="2">★</span>
                            <span data-val="3">★</span>
                            <span data-val="4">★</span>
                            <span data-val="5">★</span>
                        </div>
                        <input type="hidden" id="rating" value="5">
                    </div>
                    <div class="form-group">
                        <label>Review</label>
                        <textarea id="reviewText" placeholder="Share your thoughts about this movie..." required></textarea>
                    </div>
                    <button type="submit" class="submit-btn">Submit Review</button>
                </form>
            </div>

            <!-- Average Rating -->
            <div class="rating-summary-card">
                <h2 class="section-title">⭐ Average Rating</h2>
                <div id="averageRating" class="avg-rating-display">Loading...</div>
            </div>

            <!-- Reviews List -->
            <div class="reviews-list-section">
                <h2 class="section-title">💬 User Reviews</h2>
                <div id="reviewsContainer"></div>
            </div>

        </div>
    </div>

    <!-- Footer -->
    <footer>
        <p>© 2026 CineVerse — Movie Review & Rating Website. All rights reserved.</p>
    </footer>

    <script src="js/movie-details.js"></script>
</body>
</html>
